version: "2"
run:
  issues-exit-code: 1
  tests: false
linters:
  default: none
  enable:
    - errcheck
    - govet
    - misspell
    - revive
    - unused
  settings:
    revive:
      rules:
        - name: exported
          severity: warning
        - name: unused-parameter
          severity: warning
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - revive
        text: stutters
      - linters:
          - errcheck
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
